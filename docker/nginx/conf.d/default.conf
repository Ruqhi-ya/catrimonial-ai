server {
    listen 80;
    server_name localhost catrimonial.ai;

    # Backend API
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Auth endpoints - stricter rate limiting
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # AI Service
    location /api/ai/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://ai_service/api/ai/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # File uploads - stricter rate limit and size
    location /api/upload {
        limit_req zone=upload burst=5 nodelay;
        client_max_body_size 10M;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Swagger UI (dev only)
    location /swagger-ui/ {
        proxy_pass http://backend/api/swagger-ui/;
        proxy_set_header Host $host;
    }

    # Health checks
    location /health {
        access_log off;
        proxy_pass http://backend/api/actuator/health;
    }

    # Monitoring endpoints (restricted)
    location /metrics {
        allow 172.0.0.0/8;
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://backend/api/actuator/prometheus;
    }

    # Block common exploits
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(wp-admin|wp-login|xmlrpc) {
        deny all;
        access_log off;
    }
}
