global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'catrimonial-backend'
    metrics_path: '/api/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: 'backend'
          environment: 'production'

  - job_name: 'catrimonial-ai-service'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets: ['ai-service:8000']
        labels:
          service: 'ai-service'
          environment: 'production'
